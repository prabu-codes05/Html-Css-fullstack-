<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
</head>
<style>
    li{
        list-style: none;
    }
    a{
        text-decoration: none;
    }
    nav{
       background-color: green;
       color: white;
        padding: 10px 36px;
        display: flex;
         justify-content: space-between;
         align-items: center;
         position: relative;
    }

    nav .age{
         font-size: 32px;
      font-weight: 800;
    }

    nav .heading ul li a{
        color: white;
    }

    nav .heading ul{
          display: flex;
          gap: 40px;   
    }

    nav .heading{
        display: flex;
        align-items: center;
       gap: 30px;
    }

    
    

</style>
<body>
    <nav>   
        <div class="age">hello</div>
        <div class="heading">
        <ul>
            <li><a href="">home</a></li>
            <li><a href="">phone no</a></li>
            <li><a href="">Address</a></li>
            <li><a href="">details</a></li>
        </ul>
        <div class="bttn">
            <button>get started</button>
        </div>
        </div>

    </nav>
    
</body>
</html>
