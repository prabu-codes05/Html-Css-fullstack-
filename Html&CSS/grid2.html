<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chessboard</title>
    <style>
    /*each square should be 100px by 100px*/
    /*colours for white : #f0d9b5, for black: #b58863*/
    .container{
        display: grid;
        width: 800px;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
        
       
    }
    .white{
        background-color:#f0d9b5;
        height: 100px;
        width: 100px;
    }
    .black{
         background-color:#b58863;
        height: 100px;
        width: 100px;
        
    }
    </style>
</head>
<body>
   <div class="container">
    <div class="white"></div>
    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>
   </div>

    </div>

    
</body>
</html>
